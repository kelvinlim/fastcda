site_name: fastcda
site_description: Python package for causal discovery analysis using CMU's Tetrad library
site_url: https://kelvinlim.github.io/fastcda/
repo_url: https://github.com/kelvinlim/fastcda
repo_name: kelvinlim/fastcda

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            members_order: source
            show_root_heading: true
            show_if_no_docstring: false
  - mkdocs-jupyter:
      execute: false

nav:
  - Home: index.md
  - User Guide: user_guide.md
  - Background Knowledge: knowledge.md
  - API Reference: api.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
